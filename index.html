<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Bets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚔️ Battle Bets</h1>
        <div class="currencies">
            <div class="currency"><span id="coin-count">0</span> 🪙</div>
            <div class="currency"><span id="ruby-count">0</span> 💎</div>
        </div>
    </header>

    <nav>
        <button onclick="ui.changeTab('battle')">Batalla</button>
        <button onclick="ui.changeTab('collection')">Colección</button>
        <button onclick="ui.changeTab('shop')">Tienda</button>
        <button onclick="ui.changeTab('records')">Locuras</button>
    </nav>

    <main>
        <section id="tab-battle" class="tab-content active">
            <div class="setup-area">
                <div class="team-setup" id="team-a-setup">
                    <h2>Equipo A (Rojo)</h2>
                    <select id="unit-select-a"></select>
                    <input type="number" id="unit-qty-a" value="10" min="1" max="500">
                </div>
                <div class="vs-badge">VS</div>
                <div class="team-setup" id="team-b-setup">
                    <h2>Equipo B (Azul)</h2>
                    <select id="unit-select-b"></select>
                    <input type="number" id="unit-qty-b" value="10" min="1" max="500">
                </div>
            </div>

            <div class="bet-area">
                <h3>Apuestas</h3>
                <p>Probabilidad de victoria: <span id="prob-a">50%</span> Rojo vs <span id="prob-b">50%</span> Azul</p>
                <div class="bet-controls">
                    <input type="number" id="bet-amount" placeholder="Cantidad de 🪙" min="10">
                    <button class="btn-bet" onclick="game.placeBet('A')">Apostar al Rojo</button>
                    <button class="btn-bet" onclick="game.placeBet('B')">Apostar al Azul</button>
